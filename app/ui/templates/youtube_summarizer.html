<div class="yts-page" id="ytsPage">

    <!-- LOADING OVERLAY -->
    <div class="yts-overlay" id="ytsOverlay" aria-hidden="true" aria-live="polite">
      <div class="yts-overlay__inner">
        <div class="yts-overlay__letters" id="ytsOverlayLetters">
          <span>G</span><span>e</span><span>n</span><span>e</span><span>r</span><span>a</span><span>t</span><span>i</span><span>n</span><span>g</span><span>.</span><span>.</span><span>.</span>
        </div>
        <div class="yts-overlay__bar">
          <div class="yts-overlay__bar-fill" id="ytsOverlayBar"></div>
        </div>
        <p class="yts-overlay__hint" id="ytsOverlayHint">Fetching video metadata…</p>
      </div>
    </div>

    <!-- ── HERO ── -->
    <section class="yts-hero">
      <div class="yts-hero__eyebrow">
        <span class="yts-badge">
          <svg class="yts-badge__icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 2L13.09 8.26L19 6L15.45 11.25L21 13.27L15.36 14.18L17 20L12 16.9L7 20L8.64 14.18L3 13.27L8.55 11.25L5 6L10.91 8.26L12 2Z" fill="currentColor"/>
          </svg>
          AI-Powered
        </span>
      </div>

      <h1 class="yts-hero__heading">
        Summarize any
        <span class="yts-hero__rotating-wrap" aria-label="YouTube content type">
          <span class="yts-hero__rotating-track" id="ytsRotatingTrack">
            <span class="yts-hero__rotating-word">Lecture</span>
            <span class="yts-hero__rotating-word">Tutorial</span>
            <span class="yts-hero__rotating-word">Podcast</span>
            <span class="yts-hero__rotating-word">Interview</span>
            <span class="yts-hero__rotating-word">Meeting</span>
            <span class="yts-hero__rotating-word">Conference</span>
            <span class="yts-hero__rotating-word">Course</span>
            <span class="yts-hero__rotating-word">Research</span>
            <span class="yts-hero__rotating-word">Lecture</span>
          </span>
        </span>
      </h1>
      <p class="yts-hero__sub">Generate structured AI summaries from any YouTube video — in seconds.</p>
    </section>

    <!-- ── INPUT CARD ── -->
    <section class="yts-section" aria-label="Video URL input">
      <div class="yts-input-card" id="ytsInputCard">
        <div class="yts-input-card__header">
          <!-- YouTube Icon -->
          <svg class="yts-yt-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46A2.78 2.78 0 0 0 1.46 6.42 29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58 2.78 2.78 0 0 0 1.95 1.96C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.96-1.96A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z" fill="#FF0000"/>
            <polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="#fff"/>
          </svg>
          <span class="yts-input-card__label">YouTube Video URL</span>
        </div>

        <div class="yts-input-wrap" id="ytsInputWrap">
          <input
            class="yts-url-input"
            id="ytsUrlInput"
            type="url"
            placeholder="https://www.youtube.com/watch?v=..."
            autocomplete="off"
            spellcheck="false"
            aria-label="YouTube video URL"
          />
          <div class="yts-input-actions">
            <button class="yts-icon-btn" id="ytsPasteBtn" aria-label="Paste from clipboard" title="Paste">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><rect x="9" y="2" width="6" height="4" rx="1"/><path d="M8 4H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-2"/></svg>
            </button>
            <button class="yts-icon-btn" id="ytsClearBtn" aria-label="Clear input" title="Clear" style="display:none">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
        </div>

        <p class="yts-input-card__error" id="ytsUrlError" role="alert" aria-live="assertive"></p>

        <!-- VIDEO PREVIEW -->
        <div class="yts-preview" id="ytsPreview" aria-live="polite" aria-label="Video preview">
          <div class="yts-preview__thumb-wrap">
            <img class="yts-preview__thumb" id="ytsThumb" src="" alt="Video thumbnail" />
            <span class="yts-preview__duration" id="ytsDuration"></span>
          </div>
          <div class="yts-preview__meta">
            <p class="yts-preview__title" id="ytsVideoTitle"></p>
            <p class="yts-preview__channel" id="ytsChannel"></p>
            <p class="yts-preview__date" id="ytsDate"></p>
          </div>
        </div>
      </div>
    </section>

    <!-- ── SETTINGS ── -->
    <section class="yts-section" aria-label="Summary settings" id="ytsSettings">

      <!-- Summary Style -->
      <div class="yts-settings-group">
        <h2 class="yts-settings-group__title">Summary Style</h2>
        <div class="yts-style-grid" role="radiogroup" aria-label="Summary style">
          <button class="yts-style-card yts-style-card--active" role="radio" aria-checked="true" data-style="standard">
            <span class="yts-style-card__icon">📄</span>
            <span class="yts-style-card__name">Standard</span>
            <span class="yts-style-card__desc">Clean paragraph summary</span>
          </button>
          <button class="yts-style-card" role="radio" aria-checked="false" data-style="bullets">
            <span class="yts-style-card__icon">•</span>
            <span class="yts-style-card__name">Bullet Points</span>
            <span class="yts-style-card__desc">Quick scannable list</span>
          </button>
          <button class="yts-style-card" role="radio" aria-checked="false" data-style="detailed">
            <span class="yts-style-card__icon">🔍</span>
            <span class="yts-style-card__name">Detailed Notes</span>
            <span class="yts-style-card__desc">In-depth breakdown</span>
          </button>
          <button class="yts-style-card" role="radio" aria-checked="false" data-style="timeline">
            <span class="yts-style-card__icon">⏱</span>
            <span class="yts-style-card__name">Timeline</span>
            <span class="yts-style-card__desc">Timestamped moments</span>
          </button>
          <button class="yts-style-card" role="radio" aria-checked="false" data-style="study">
            <span class="yts-style-card__icon">📚</span>
            <span class="yts-style-card__name">Study Notes</span>
            <span class="yts-style-card__desc">Learn & retain</span>
          </button>
          <button class="yts-style-card" role="radio" aria-checked="false" data-style="actions">
            <span class="yts-style-card__icon">✅</span>
            <span class="yts-style-card__name">Action Items</span>
            <span class="yts-style-card__desc">Takeaways to act on</span>
          </button>
        </div>
      </div>

      <!-- Length + Tone Row -->
      <div class="yts-settings-row">

        <!-- Length -->
        <div class="yts-settings-group yts-settings-group--half">
          <h2 class="yts-settings-group__title">Summary Length</h2>
          <div class="yts-segment" role="radiogroup" aria-label="Summary length">
            <button class="yts-segment__btn" role="radio" aria-checked="false" data-length="short">Short</button>
            <button class="yts-segment__btn yts-segment__btn--active" role="radio" aria-checked="true" data-length="medium">Medium</button>
            <button class="yts-segment__btn" role="radio" aria-checked="false" data-length="long">Long</button>
            <span class="yts-segment__pill" id="ytsSegmentPill" aria-hidden="true"></span>
          </div>
        </div>

        <!-- Tone -->
        <div class="yts-settings-group yts-settings-group--half">
          <h2 class="yts-settings-group__title">Tone</h2>
          <div class="yts-tone-grid" role="radiogroup" aria-label="Summary tone">
            <button class="yts-tone-btn yts-tone-btn--active" role="radio" aria-checked="true" data-tone="professional">Professional</button>
            <button class="yts-tone-btn" role="radio" aria-checked="false" data-tone="student">Student</button>
            <button class="yts-tone-btn" role="radio" aria-checked="false" data-tone="beginner">Beginner</button>
            <button class="yts-tone-btn" role="radio" aria-checked="false" data-tone="technical">Technical</button>
          </div>
        </div>

      </div>

      <!-- Generate CTA -->
      <div class="yts-cta-wrap">
        <button class="yts-generate-btn" id="ytsGenerateBtn" aria-label="Generate summary">
          <span class="yts-generate-btn__gradient" aria-hidden="true"></span>
          <span class="yts-generate-btn__content">
            <svg class="yts-generate-btn__icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 2l1.09 6.26L19 6l-3.55 5.25L21 13.27l-5.64.91L17 20l-5-3.1L7 20l1.64-5.82L3 13.27l5.55-2.02L5 6l5.91 2.26L12 2z" fill="currentColor"/>
            </svg>
            Generate Summary
          </span>
        </button>
      </div>

    </section>

    <!-- ── RESULTS ── -->
    <section class="yts-results" id="ytsResults" aria-label="Summary results" aria-live="polite">

      <div class="yts-results__header">
        <h2 class="yts-results__title">Summary Results</h2>
        <div class="yts-results__actions">
          <button class="yts-pill-btn" id="ytsCopyAllBtn" aria-label="Copy all results">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><rect x="9" y="2" width="6" height="4" rx="1"/><path d="M8 4H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-2"/></svg>
            Copy All
          </button>
          <button class="yts-pill-btn" id="ytsNewBtn" aria-label="Start a new summary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            New Summary
          </button>
        </div>
      </div>

      <!-- Result Cards rendered by JS -->
      <div class="yts-cards-grid" id="ytsCardsGrid"></div>

    </section>

</div>
</body>
</html>
