<main class="auth-shell">

    <section class="auth-story">

        <a class="auth-brand" href="/">
            <div class="brand-mark">
                <img
                    src="/assets/logo.png"
                    class="logo-image"
                >
            </div>

            <span class="brand-wordmark">
                SandBox
            </span>
        </a>

        <div class="auth-copy">

            <p class="eyebrow">
                Reset Password
            </p>

            <h1>
                Forgot your password?
            </h1>

            <p>
                Enter your registered email address.
                We'll send you a password reset link.
            </p>

        </div>

    </section>

    <section class="auth-panel">

        <div class="auth-card">

            <div class="auth-header">

                <h2>
                    Forgot Password
                </h2>

                <p>
                    Enter your email below.
                </p>

            </div>

            <div
                class="auth-alert"
                role="status"
            ></div>

            <form id="forgot-form">

                <label class="field">

                    <span>Email</span>

                    <input
                        id="email"
                        type="email"
                        placeholder="you@example.com"
                        required
                    >

                </label>

                <button
                    class="btn-auth btn-primary"
                    type="submit"
                >

                    <span>
                        Send Reset Link
                    </span>

                </button>

            </form>

            <p class="auth-switch">

                Remembered your password?

                <a href="/login">
                    Login
                </a>

            </p>

        </div>

    </section>

</main>
