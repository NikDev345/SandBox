<div class="auth-wrapper">

    <div class="auth-card">

        <div class="auth-header">

            <h1>ToolBox</h1>

            <p>
                Sign in to continue
            </p>

        </div>

        <form id="login-form">

            <div class="input-group">

                <label>Email</label>

                <input
                    type="email"
                    id="email"
                    placeholder="you@example.com"
                >

            </div>

            <div class="input-group">

                <label>Password</label>

                <input
                    type="password"
                    id="password"
                    placeholder="••••••••"
                >

            </div>

            <button
                type="submit"
                class="btn-primary"
            >
                Sign In
            </button>

        </form>

        <div class="divider">
            OR
        </div>

        <button
    class="btn-secondary"
    id="guest-login"
>
    Continue as Guest
</button>

<button class="btn-secondary social-btn">

    <img alt="google-logo"
        src="https://cdn.simpleicons.org/google"
        width="18"
        height="18"
    >

    Continue with Google

</button>
<button class="btn-secondary social-btn">

    👤

    Continue as Guest

</button>

        <div class="signup-link">

            Don't have an account?

            <a href="/signup">
                Create Account
            </a>

        </div>

    </div>

</div>
