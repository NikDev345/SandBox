<main class="auth-shell">

    <section class="auth-story">

        <a class="auth-brand" href="/">
            <div class="brand-mark">
                <img
                    src="/assets/logo.png"
                    class="logo-image"
                >
            </div>

            <span class="brand-wordmark">
                SandBox
            </span>
        </a>

        <div class="auth-copy">

            <p class="eyebrow">
                Password Recovery
            </p>

            <h1>
                Create a new password
            </h1>

            <p>
                Your new password should be strong and different from your previous password.
            </p>

        </div>

    </section>

    <section class="auth-panel">

        <div class="auth-card">

            <div class="auth-header">

                <h2>
                    Reset Password
                </h2>

                <p>
                    Enter your new password.
                </p>

            </div>

            <div
                class="auth-alert"
                role="status"
            ></div>

            <form id="reset-form">

                <label class="field">

                    <span>New Password</span>

                    <input
                        id="password"
                        type="password"
                        minlength="6"
                        required
                    >

                </label>

                <label class="field">

                    <span>Confirm Password</span>

                    <input
                        id="confirm_password"
                        type="password"
                        minlength="6"
                        required
                    >

                </label>

                <button
                    class="btn-auth btn-primary"
                    type="submit"
                >
                    <span>
                        Reset Password
                    </span>
                </button>

            </form>

        </div>

    </section>

</main>
