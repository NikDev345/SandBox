<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcard Generator — Preview</title>
<link rel="stylesheet" href="new.css">
</head>
<body>

  <div class="ambient-glow"></div>

  <header class="topbar">
    <div class="brand">
      <span class="brand-mark"></span>
      <span class="brand-text">Flashcard Generator</span>
    </div>
    <div class="progress-pill">
      <span id="progressLabel">Card 1 of 5</span>
    </div>
  </header>

  <main class="stage">

    <button class="nav-arrow nav-arrow--left" id="prevBtn" aria-label="Previous card" disabled>
      <svg viewBox="0 0 24 24" fill="none"><path d="M15 5L8 12L15 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>

    <div class="deck" id="deck">
      <!-- cards injected by JS -->
    </div>

    <button class="nav-arrow nav-arrow--right" id="nextBtn" aria-label="Next card">
      <svg viewBox="0 0 24 24" fill="none"><path d="M9 5L16 12L9 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>

  </main>

  <footer class="hint-bar">
    <div class="hint">
      <svg viewBox="0 0 24 24" fill="none" class="hint-icon"><path d="M12 2v20M2 12h20" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" opacity="0.5"/></svg>
      <span>Tap the card to flip · Use arrows or ← → to navigate</span>
    </div>
    <div class="dots" id="dots"></div>
  </footer>

  <script src="new.js"></script>
</body>
</html>
